# ===========================================================================
# Neo4j Configuration for kloc-intelligence
# Tuned for large PHP codebases (up to 721K nodes, 1.6M edges)
# ===========================================================================

# --- Memory ---
# Heap: controls query execution memory.
# For 721K+ node datasets, 4-8 GB is recommended.
server.memory.heap.initial_size=2g
server.memory.heap.max_size=4g

# Page cache: stores graph data pages in memory.
# Should ideally fit the entire graph. For 552MB sot.json -> ~2-3 GB on disk.
server.memory.pagecache.size=3g

# Transaction memory limit (per transaction, prevents runaway queries)
db.memory.transaction.total.max=2g

# --- Networking ---
server.default_listen_address=0.0.0.0

# Bolt connector (primary protocol for kloc-intelligence)
server.bolt.enabled=true
server.bolt.listen_address=0.0.0.0:7687
server.bolt.advertised_address=:7687

# HTTP connector (Neo4j Browser, monitoring)
server.http.enabled=true
server.http.listen_address=0.0.0.0:7474
server.http.advertised_address=:7474

# Disable HTTPS (not needed for internal use)
server.https.enabled=false

# --- Performance ---
# Thread pool for bolt connections
server.bolt.thread_pool_min_size=5
server.bolt.thread_pool_max_size=400

# Keep-alive for bolt connections
server.bolt.connection_keep_alive_for_requests=ALL
server.bolt.connection_keep_alive=30s

# --- Query tuning ---
# Cypher query cache size (number of plans to keep)
server.db.query_cache_size=1000

# Query logging (helps identify slow queries)
db.logs.query.enabled=OFF
db.logs.query.threshold=200ms

# --- Import tuning ---
# These settings help with batch imports of large datasets
server.memory.off_heap.max_size=2g

# --- Security ---
# Allow upgrade from previous versions
dbms.allow_upgrade=true

# --- Logging ---
server.directories.logs=/logs
