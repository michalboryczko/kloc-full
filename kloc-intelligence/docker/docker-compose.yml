services:
  neo4j:
    image: neo4j:5-community
    container_name: kloc-neo4j-prod
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-kloc-intelligence}"
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./neo4j.conf:/conf/neo4j.conf:ro
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 4g

  kloc-intelligence:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: kloc-intelligence
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-kloc-intelligence}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
    volumes:
      - sot-data:/data
    stdin_open: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import src.config; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  neo4j-data:
  neo4j-logs:
  sot-data:
