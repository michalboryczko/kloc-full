name: CI

on:
  push:
    branches: [main]
    paths:
      - 'kloc-intelligence/**'
  pull_request:
    branches: [main]
    paths:
      - 'kloc-intelligence/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/test-password
          NEO4J_PLUGINS: '[]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "neo4j status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: test-password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: kloc-intelligence
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        working-directory: kloc-intelligence
        run: ruff check src/ tests/

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 7687; then
              echo "Neo4j is ready"
              break
            fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 2
          done

      - name: Run unit tests
        working-directory: kloc-intelligence
        run: pytest tests/ -v --tb=short -m "not snapshot"

      - name: Run snapshot tests
        working-directory: kloc-intelligence
        run: pytest tests/ -v --tb=short -m snapshot
        continue-on-error: true
