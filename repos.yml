# KLOC project repositories
# Used by setup.sh and build.sh

repos:
  - name: kloc-cli
    url: https://github.com/michalboryczko/kloc-cli.git
    build: ./build.sh
    binary: dist/kloc-cli
    description: CLI for querying KLOC Source-of-Truth JSON

  - name: kloc-mapper
    url: https://github.com/michalboryczko/kloc-mapper.git
    build: ./build.sh
    binary: dist/kloc-mapper
    description: SCIP to SoT JSON mapper

  - name: kloc-indexer-php
    url: https://github.com/michalboryczko/kloc-php-indexer.git
    build: cargo build --release
    binary: target/release/kloc-indexer-php
    description: Rust SCIP indexer for PHP projects

  - name: kloc-symfony
    url: https://github.com/michalboryczko/kloc-symfony.git
    build: "true"
    binary: "true"
    description: Symfony framework extractor (routes, DI, handlers, listeners, commands, flows) -> symfony-kloc.json

  - name: kloc-intelligence
    url: https://github.com/michalboryczko/kloc-intelligence.git
    build: "true"
    binary: "true"
    description: Graph-native code intelligence service (Neo4j + Qdrant) over sot.json

  - name: kloc-reference-project-php
    url: https://github.com/michalboryczko/kloc-reference-project-php.git
    build: "true"
    binary: "true"
    description: PHP reference project for testing and contract validation
